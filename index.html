<!doctype html>
<html lang="en" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#00AF66" />
    <meta name="description" content="Request Logs investigator for StackOne — find and fix integration failures fast." />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- manifest link is auto-injected by vite-plugin-pwa in production builds. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Request Logs — StackOne</title>
    <script>
      // Resolve theme before paint to avoid flash. Reads localStorage; if 'auto' or missing,
      // resolves from prefers-color-scheme. Listens for OS changes when auto.
      (function () {
        var stored = localStorage.getItem('theme');
        var mode = stored || 'auto';
        var resolve = function (m) {
          if (m === 'auto') {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          return m;
        };
        document.documentElement.dataset.theme = resolve(mode);
        document.documentElement.dataset.themeMode = mode;
        if (mode === 'auto') {
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
            if (document.documentElement.dataset.themeMode === 'auto') {
              document.documentElement.dataset.theme = e.matches ? 'dark' : 'light';
            }
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
