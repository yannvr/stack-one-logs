  <g transform="translate(256 256) scale(14) translate(-12 -12)">
    <path d="M3 7l9-5 9 5-9 5-9-5z" fill="#FFFFFF"/>
    <path d="M3 12l9 5 9-5" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M3 17l9 5 9-5" stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
