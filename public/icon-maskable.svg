<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable variant — fills the bleed area with the brand green wash so
       Android adaptive icons (which crop to various shapes) stay branded.
       Inner mark sized to fit the safe zone (centre 80% of the canvas). -->
